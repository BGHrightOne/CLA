<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対応記録音声入力</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        #chat-box { height: 45vh; overflow-y: auto; background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .msg { margin: 8px 0; padding: 10px 14px; border-radius: 15px; max-width: 85%; line-height: 1.4; word-break: break-all; }
        .user { background: #DCF8C6; margin-left: auto; text-align: left; }
        .ai { background: #EAEAEA; margin-right: auto; white-space: pre-wrap; }
        
        /* 💡 プレビュー欄の縦幅を5倍（50px → 250px）に拡張し、スクロール可能に */
        #preview-box { height: 250px; background: #fff; border: 1px dashed #bbb; border-radius: 8px; padding: 12px; margin-bottom: 10px; font-size: 15px; color: #666; overflow-y: auto; line-height: 1.5; word-break: break-all; }
        
        button { width: 100%; padding: 14px; font-size: 16px; border: none; border-radius: 5px; color: white; margin-bottom: 8px; font-weight: bold; cursor: pointer; }
        #voice-btn { background: #06C755; }
        #copy-btn { background: #333; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ai">音声記録を開始します。今日の記録者のお名前と、対象の利用者のお名前を教えてください。</div>
    </div>

    <div id="preview-box">🎙️ ボタンを押して話すと、ここにリアルタイムで文字が表示されます...</div>

    <button id="voice-btn" onclick="toggleSpeech()">🎤 音声入力ON (待機中)</button>
    <button id="copy-btn" onclick="copyResult()">📋 まとめのコピー</button>

    <script>
        // ==========================================
        // 🛠️ あなたの環境に合わせてここを書き換えてください
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwreZK7UUygRJNtC26Ipcam9m7gdkfR7d1RHJqec5NfLBSUJ_KXf4xOOxTbheiqYhM/exec"; 
        // ==========================================

        let recognition;
        let isListening = false;
        let autoShutdownTimer = null; // 5分タイマー用
        let accumulatedText = "";     // 音声を溜めておく変数
        
        const previewBox = document.getElementById('preview-box');

        if ('webkitSpeechRecognition' in window || 'speechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true;
            recognition.interimResults = true; 
            recognition.lang = 'ja-JP';

            recognition.onresult = (event) => {
                let interimTranscript = ''; 
                let newFinalTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        newFinalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // 確定した文字があれば、変数にどんどん溜め込んでいく
                if (newFinalTranscript !== '') {
                    accumulatedText += newFinalTranscript;
                }

                // プレビュー表示には「確定分」＋「今喋っている途中」をリアルタイムに出す
                let currentTotalText = accumulatedText + interimTranscript;
                if (currentTotalText.trim() !== '') {
                    previewBox.innerText = "🗣️ 認識中:\n" + currentTotalText;
                    previewBox.style.color = "#000"; 
                    // 長文になっても最新の入力が常に見えるように自動スクロール
                    previewBox.scrollTop = previewBox.scrollHeight;
                }
            };

            // ON状態の間は自動再開して音声を拾い続ける
            recognition.onend = () => {
                if (isListening) {
                    console.log("音声認識が一時終了したため、自動再開します...");
                    try {
                        recognition.start(); 
                    } catch(e) {
                        console.error("再開エラー:", e);
                    }
                }
            };
            
            // エラー発生時の処理
            recognition.onerror = (event) => {
                console.error("音声認識エラー: ", event.error);
                if (event.error === 'no-speech') {
                    // 無言の時は何もしない
                } else if (event.error !== 'aborted') {
                    alert("音声認識でエラーが発生しました: " + event.error);
                    stopSpeech(false); 
                    previewBox.innerText = "❌ エラーにより音声入力を停止しました。";
                }
            };
        } else {
            alert("お使いのブラウザは音声認識に対応していません。Google Chromeなどでお試しください。");
        }

        // 音声ボタンのトグル切り替え
        function toggleSpeech() {
            if (!isListening) {
                startSpeech();
            } else {
                stopSpeech(true);
            }
        }

        // 音声入力を開始する関数
        function startSpeech() {
            const btn = document.getElementById('voice-btn');
            try {
                isListening = true;
                accumulatedText = ""; 
                recognition.start();
                
                btn.innerText = "🛑 話し終えたらここを押して送信";
                btn.style.background = "#ff4d4d";
                previewBox.innerText = "🎙️ 音声入力中：どれだけ長話をしても、途中で言葉を止めても勝手には送信されません。";
                previewBox.style.color = "#000";

                // ⏱️ 5分の自動シャットダウンタイマー
                clearTimeout(autoShutdownTimer);
                autoShutdownTimer = setTimeout(() => {
                    if (isListening) {
                        stopSpeech(true);
                        alert("ONの状態で5分が経過したため、自動で送信してオフにしました。");
                    }
                }, 300000); 

            } catch(e) {
                console.error("起動エラー:", e);
                alert("マイクの起動に失敗しました。ページを再読み込みするか、マイクの権限を確認してください。");
                stopSpeech(false);
            }
        }

        // 音声入力を完全に停止する関数
        function stopSpeech(doSend) {
            isListening = false;
            clearTimeout(autoShutdownTimer); 
            
            try {
                recognition.stop();
            } catch(e) {
                console.error("停止エラー:", e);
            }
            
            const btn = document.getElementById('voice-btn');
            btn.innerText = "🎤 音声入力ON (待機中)";
            btn.style.background = "#06C755";
            
            // 送信フラグが立っており、かつ文字が溜まっていれば送信
            if (doSend && accumulatedText.trim() !== '') {
                addMessage(accumulatedText, 'user');
                sendToGemini(accumulatedText);
                // 💡 送信後も、何を送信したか分かるようにプレビュー欄に少し残す
                previewBox.innerText = "📥 以下の内容を送信しました：\n\n" + accumulatedText;
                previewBox.style.color = "#888";
            } else {
                previewBox.innerText = "🛑 音声入力はオフです（送信はされませんでした）。";
                previewBox.style.color = "#666";
            }
            
            // 次回のために溜め込み変数をリセット
            accumulatedText = "";
        }

        function addMessage(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendToGemini(text) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                addMessage(data.reply, 'ai');
            } catch (error) {
                console.error(error);
                addMessage("通信エラーが発生しました。もう一度お試しください。", 'ai');
            }
        }

        function copyResult() {
            const messages = document.querySelectorAll('.ai');
            if(messages.length <= 1) {
                alert("コピーするまとめがまだありません。");
                return;
            }
            const lastMessage = messages[messages.length - 1].innerText;
            navigator.clipboard.writeText(lastMessage).then(() => {
                alert("最新のメッセージをコピーしました！");
            }).catch(err => {
                alert("コピーに失敗しました。文字を長押しして選択してください。");
            });
        }
    </script>
</body>
</html>
