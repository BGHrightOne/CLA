<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対応記録音声入力</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        #chat-box { height: 55vh; overflow-y: auto; background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .msg { margin: 8px 0; padding: 10px 14px; border-radius: 15px; max-width: 85%; line-height: 1.4; word-break: break-all; }
        .user { background: #DCF8C6; margin-left: auto; text-align: left; }
        .ai { background: #EAEAEA; margin-right: auto; white-space: pre-wrap; }
        
        /* 💡 入力プレビュー欄のスタイル */
        #preview-box { height: 50px; background: #fff; border: 1px dashed #bbb; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 14px; color: #666; overflow-y: auto; }
        
        button { width: 100%; padding: 14px; font-size: 16px; border: none; border-radius: 5px; color: white; margin-bottom: 8px; font-weight: bold; cursor: pointer; }
        #voice-btn { background: #06C755; }
        #copy-btn { background: #333; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ai">音声記録を開始します。今日の記録者のお名前と、対象の利用者のお名前を教えてください。</div>
    </div>

    <div id="preview-box" id="preview">🎙️ ボタンを押して話すと、ここにリアルタイムで文字が表示されます...</div>

    <button id="voice-btn" onclick="toggleSpeech()">🎤 音声入力ON (待機中)</button>
    <button id="copy-btn" onclick="copyResult()">📋 まとめのコピー</button>

    <script>
        // ==========================================
        // 🛠️ あなたの環境に合わせてここを書き換えてください
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyC8evm9Q02Q__DMhxjkryyrQ_aijEJSwjT42yIGid_IbGOOIBdZuIaAPeUXdmYeWr7/exec"; 
        // ==========================================

        let recognition;
        let isListening = false;
        const previewBox = document.getElementById('preview-box');

        if ('webkitSpeechRecognition' in window || 'speechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true;
            recognition.interimResults = true; // 💡 これにより、話し途中の文字も取得できます
            recognition.lang = 'ja-JP';

            recognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = ''; // 💡 話し途中のテキ ストを一時保存する変数
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        // 💡 喋っている最中の文字をどんどん結合する
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // 💡 喋っている最中ならプレビュー欄を更新
                if (interimTranscript !== '') {
                    previewBox.innerText = "🗣️ 認識中: " + interimTranscript;
                    previewBox.style.color = "#000"; // 文字を読みやすく黒に
                }

                // 確定したテキスト（一呼吸置いた文章）があれば送信してプレビューをクリア
                if (finalTranscript.trim() !== '') {
                    addMessage(finalTranscript, 'user');
                    sendToGemini(finalTranscript);
                    previewBox.innerText = "📥 送信しました。次の発言を待っています...";
                    previewBox.style.color = "#666";
                }
            };

            recognition.onend = () => {
                if (isListening) {
                    console.log("マイクが切断されたため、自動で再開します...");
                    try {
                        recognition.start(); 
                    } catch(e) {
                        console.error("再開エラー:", e);
                    }
                }
            };
            
            recognition.onerror = (event) => {
                console.error("音声認識エラー: ", event.error);
                if (event.error === 'no-speech') {
                    previewBox.innerText = "🎙️ 声が聞こえないようです。もう一度お話しください。";
                } else if (event.error !== 'aborted') {
                    alert("音声認識でエラーが発生しました: " + event.error);
                }
            };
        } else {
            alert("お使いのブラウザは音声認識に対応していません。Google Chromeなどでお試しください。");
        }

        function toggleSpeech() {
            const btn = document.getElementById('voice-btn');
            if (!isListening) {
                recognition.start();
                isListening = true;
                btn.innerText = "🛑 音声入力中...（話してください）";
                btn.style.background = "#ff4d4d";
                previewBox.innerText = "🎙️ お話しください。ここにリアルタイムで表示されます...";
            } else {
                isListening = false;
                recognition.stop();
                btn.innerText = "🎤 音声入力ON (待機中)";
                btn.style.background = "#06C755";
                previewBox.innerText = "🛑 音声入力はオフです。";
                previewBox.style.color = "#666";
            }
        }

        function addMessage(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendToGemini(text) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                addMessage(data.reply, 'ai');
            } catch (error) {
                console.error(error);
                addMessage("通信エラーが発生しました。もう一度お試しください。", 'ai');
            }
        }

        function copyResult() {
            const messages = document.querySelectorAll('.ai');
            if(messages.length <= 1) {
                alert("コピーするまとめがまだ
