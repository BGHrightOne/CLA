<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>対応記録音声入力</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        #chat-box { height: 55vh; overflow-y: auto; background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        .msg { margin: 8px 0; padding: 10px 14px; border-radius: 15px; max-width: 85%; line-height: 1.4; word-break: break-all; }
        .user { background: #DCF8C6; margin-left: auto; text-align: left; }
        .ai { background: #EAEAEA; margin-right: auto; white-space: pre-wrap; }
        
        /* 入力プレビュー欄のスタイル */
        #preview-box { height: 50px; background: #fff; border: 1px dashed #bbb; border-radius: 8px; padding: 10px; margin-bottom: 10px; font-size: 14px; color: #666; overflow-y: auto; }
        
        button { width: 100%; padding: 14px; font-size: 16px; border: none; border-radius: 5px; color: white; margin-bottom: 8px; font-weight: bold; cursor: pointer; }
        #voice-btn { background: #06C755; }
        #copy-btn { background: #333; }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="msg ai">音声記録を開始します。今日の記録者のお名前と、対象の利用者のお名前を教えてください。</div>
    </div>

    <!-- 音声入力のプレビュー表示エリア -->
    <div id="preview-box">🎙️ ボタンを押して話すと、ここにリアルタイムで文字が表示されます...</div>

    <button id="voice-btn" onclick="toggleSpeech()">🎤 音声入力ON (待機中)</button>
    <button id="copy-btn" onclick="copyResult()">📋 まとめのコピー</button>

    <script>
        // ==========================================
        // 🛠️ あなたの環境に合わせてここを書き換えてください
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyC8evm9Q02Q__DMhxjkryyrQ_aijEJSwjT42yIGid_IbGOOIBdZuIaAPeUXdmYeWr7/exec"; 
        // ==========================================

        let recognition;
        let isListening = false;
        let autoShutdownTimer = null; // 5分タイマー用変数
        const previewBox = document.getElementById('preview-box');

        if ('webkitSpeechRecognition' in window || 'speechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true;
            recognition.interimResults = true; 
            recognition.lang = 'ja-JP';

            recognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = ''; 
                
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // 喋っている最中ならプレビュー欄を更新
                if (interimTranscript !== '') {
                    previewBox.innerText = "🗣️ 認識中: " + interimTranscript;
                    previewBox.style.color = "#000"; 
                }

                // 確定したテキストがあれば送信
                if (finalTranscript.trim() !== '') {
                    addMessage(finalTranscript, 'user');
                    sendToGemini(finalTranscript);
                    previewBox.innerText = "📥 送信しました。音声入力は継続中です...";
                    previewBox.style.color = "#666";
                }
            };

            // 完全トグル化：意図しない切断時も、ON状態なら強制的に自動再開
            recognition.onend = () => {
                if (isListening) {
                    console.log("音声認識が一時終了したため、トグル継続の処理として自動再開します...");
                    try {
                        recognition.start(); 
                    } catch(e) {
                        console.error("再開エラー(無視して問題ありません):", e);
                    }
                }
            };
            
            // エラー発生時の処理
            recognition.onerror = (event) => {
                console.error("音声認識エラー: ", event.error);
                if (event.error === 'no-speech') {
                    // 無言による一時切断の場合はトグルを維持するため、プレビュー表示のみ更新
                    previewBox.innerText = "🎙️ 声を待っています（ONの状態です）...";
                } else if (event.error !== 'aborted') {
                    // 致命的なエラーの時だけアラートを出しリセット
                    alert("音声認識でエラーが発生しました: " + event.error);
                    stopSpeech();
                    previewBox.innerText = "❌ エラーにより音声入力を停止しました。";
                }
            };
        } else {
            alert("お使いのブラウザは音声認識に対応していません。Google Chromeなどでお試しください。");
        }

        // 音声ボタンのトグル切り替え（エントリーポイント）
        function toggleSpeech() {
            if (!isListening) {
                startSpeech();
            } else {
                stopSpeech();
                previewBox.innerText = "🛑 ユーザー操作により音声入力をオフにしました。";
            }
        }

        // 音声入力を開始する関数
        function startSpeech() {
            const btn = document.getElementById('voice-btn');
            try {
                isListening = true;
                recognition.start();
                
                // ボタンの見た目を「通信中（赤）」に変更
                btn.innerText = "🛑 音声入力中...（話してください）";
                btn.style.background = "#ff4d4d";
                previewBox.innerText = "🎙️ トグルON：お話しください。5分後に自動でOFFになります...";
                previewBox.style.color = "#000";

                // ⏱️ 5分（300,000ミリ秒）の自動シャットダウンタイマーを起動
                clearTimeout(autoShutdownTimer);
                autoShutdownTimer = setTimeout(() => {
                    if (isListening) {
                        stopSpeech();
                        previewBox.innerText = "⏰ 5分が経過したため、安全のために自動シャットダウン（OFF）しました。";
                        alert("ONの状態で5分が経過したため、自動で音声入力をオフにしました。");
                    }
                }, 300000); 

            } catch(e) {
                console.error("起動エラー:", e);
                alert("マイクの起動に失敗しました。ページを再読み込みするか、マイクの権限を確認してください。");
                stopSpeech();
            }
        }

        // 音声入力を完全に停止する関数
        function stopSpeech() {
            isListening = false;
            clearTimeout(autoShutdownTimer); // タイマーをクリア
            
            try {
                recognition.stop();
            } catch(e) {
                console.error("停止エラー:", e);
            }
            
            // ボタンの見た目を「待機中（緑）」に戻す
            const btn = document.getElementById('voice-btn');
            btn.innerText = "🎤 音声入力ON (待機中)";
            btn.style.background = "#06C755";
            previewBox.style.color = "#666";
        }

        function addMessage(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendToGemini(text) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                addMessage(data.reply, 'ai');
            } catch (error) {
                console.error(error);
                addMessage("通信エラーが発生しました。もう一度お試しください。", 'ai');
            }
        }

        function copyResult() {
            const messages = document.querySelectorAll('.ai');
            if(messages.length <= 1) {
                alert("コピーするまとめがまだありません。");
                return;
            }
            const lastMessage = messages[messages.length - 1].innerText;
            navigator.clipboard.writeText(lastMessage).then(() => {
                alert("最新のメッセージをコピーしました！");
            }).catch(err => {
                alert("コピーに失敗しました。文字を長押しして選択してください。");
            });
        }
    </script>
</body>
</html>
